  <text x="52" y="72" font-size="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#101828">School-year work faded fast</text>
  <text x="52" y="102" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#475467">Teen labor force participation fell from the late-1970s peak into the mid-2010s and remains far below its old baseline.</text>
  <text x="110.0" y="132.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Teen labor force participation, annual averages</text>
  <text x="110.0" y="154.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">The school-year labor market for 16- to 19-year-olds lost its postwar baseline.</text>
  <text x="110.0" y="178.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Annual average series from BLS MLR. Highlighted markers: 1979 peak, 1989, 2015.</text>
