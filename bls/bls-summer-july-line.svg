<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="920" viewBox="0 0 1220 920" role="img" aria-label="The summer job shrank, but did not disappear">
  <defs>
    <linearGradient id="bgFade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#F7F2E8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0D1321" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1220" height="920" rx="30" fill="url(#bgFade)"/>
  <g filter="url(#softShadow)">
    <rect x="22" y="22" width="1176" height="876" rx="24" fill="white" opacity="0.88"/>
  </g>
  <text x="52" y="72" font-size="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#101828">The summer job shrank, but did not disappear</text>
  <text x="52" y="102" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#475467">The summer youth labor force remains important, though much smaller than the late-1980s peak.</text>
  <text x="110.0" y="132.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Summer youth labor force participation</text>
  <text x="110.0" y="154.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">The summer-job season still exists, but the 1980s peak has not come back.</text>
  <text x="110.0" y="178.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">July rates for 16- to 24-year-olds, with men and women separated.</text>
  <line x1="110" y1="170.0" x2="1120" y2="170.0" stroke="#E5E7EB" stroke-width="1"/>
  <text x="94.0" y="174.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="end">85%</text>
  <line x1="110" y1="237.1" x2="1120" y2="237.1" stroke="#E5E7EB" stroke-width="1"/>
  <text x="94.0" y="241.1" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="end">80%</text>
  <line x1="110" y1="304.3" x2="1120" y2="304.3" stroke="#E5E7EB" stroke-width="1"/>
  <text x="94.0" y="308.3" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="end">75%</text>
  <line x1="110" y1="371.4" x2="1120" y2="371.4" stroke="#E5E7EB" stroke-width="1"/>
  <text x="94.0" y="375.4" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="end">70%</text>
  <line x1="110" y1="438.6" x2="1120" y2="438.6" stroke="#E5E7EB" stroke-width="1"/>
  <text x="94.0" y="442.6" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="end">65%</text>
  <line x1="110" y1="505.7" x2="1120" y2="505.7" stroke="#E5E7EB" stroke-width="1"/>
  <text x="94.0" y="509.7" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="end">60%</text>
  <line x1="110" y1="572.9" x2="1120" y2="572.9" stroke="#E5E7EB" stroke-width="1"/>
  <text x="94.0" y="576.9" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="end">55%</text>
  <line x1="110" y1="640.0" x2="1120" y2="640.0" stroke="#E5E7EB" stroke-width="1"/>
  <text x="94.0" y="644.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="end">50%</text>
  <line x1="138.9" y1="170" x2="138.9" y2="640" stroke="#F2F4F7" stroke-width="1"/>
  <text x="138.9" y="664.0" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">1990</text>
  <line x1="283.1" y1="170" x2="283.1" y2="640" stroke="#F2F4F7" stroke-width="1"/>
  <text x="283.1" y="664.0" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">1995</text>
  <line x1="427.4" y1="170" x2="427.4" y2="640" stroke="#F2F4F7" stroke-width="1"/>
  <text x="427.4" y="664.0" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">2000</text>
  <line x1="571.7" y1="170" x2="571.7" y2="640" stroke="#F2F4F7" stroke-width="1"/>
  <text x="571.7" y="664.0" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">2005</text>
  <line x1="716.0" y1="170" x2="716.0" y2="640" stroke="#F2F4F7" stroke-width="1"/>
  <text x="716.0" y="664.0" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">2010</text>
  <line x1="860.3" y1="170" x2="860.3" y2="640" stroke="#F2F4F7" stroke-width="1"/>
  <text x="860.3" y="664.0" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">2015</text>
  <line x1="1004.6" y1="170" x2="1004.6" y2="640" stroke="#F2F4F7" stroke-width="1"/>
  <text x="1004.6" y="664.0" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">2020</text>
  <polyline points="110.0,270.7 138.9,302.9 167.7,323.1 254.3,316.4 369.7,333.8 427.4,349.9 514.0,407.7 629.4,438.6 687.1,465.4 716.0,499.0 831.4,499.0 889.1,504.4 975.7,481.5 1004.6,542.0 1033.4,499.0 1062.3,500.3 1091.1,503.0 1120.0,500.3" fill="none" stroke="#1F2937" stroke-width="5"/>
  <circle cx="110.0" cy="270.7" r="4.2" fill="#1F2937"/>
  <circle cx="369.7" cy="333.8" r="4.2" fill="#1F2937"/>
  <circle cx="687.1" cy="465.4" r="4.2" fill="#1F2937"/>
  <circle cx="975.7" cy="481.5" r="4.2" fill="#1F2937"/>
  <circle cx="1091.1" cy="503.0" r="4.2" fill="#1F2937"/>
  <polyline points="110.0,199.5 138.9,226.4 167.7,242.5 254.3,253.3 369.7,286.8 427.4,301.6 514.0,371.4 629.4,399.6 687.1,439.9 716.0,469.5 831.4,462.7 889.1,473.5 975.7,462.7 1004.6,527.2 1033.4,481.5 1062.3,482.9 1091.1,500.3 1120.0,489.6" fill="none" stroke="#244A71" stroke-width="3" stroke-dasharray="6 4"/>
  <circle cx="110.0" cy="199.5" r="4.2" fill="#244A71"/>
  <circle cx="369.7" cy="286.8" r="4.2" fill="#244A71"/>
  <circle cx="687.1" cy="439.9" r="4.2" fill="#244A71"/>
  <circle cx="975.7" cy="462.7" r="4.2" fill="#244A71"/>
  <circle cx="1091.1" cy="500.3" r="4.2" fill="#244A71"/>
  <polyline points="110.0,339.2 138.9,378.1 167.7,403.7 254.3,379.5 369.7,380.8 427.4,396.9 514.0,445.3 629.4,477.5 687.1,490.9 716.0,531.2 831.4,535.3 889.1,536.6 975.7,500.3 1004.6,556.7 1033.4,517.8 1062.3,516.5 1091.1,505.7 1120.0,511.1" fill="none" stroke="#C65A6A" stroke-width="3" stroke-dasharray="6 4"/>
  <circle cx="110.0" cy="339.2" r="4.2" fill="#C65A6A"/>
  <circle cx="369.7" cy="380.8" r="4.2" fill="#C65A6A"/>
  <circle cx="687.1" cy="490.9" r="4.2" fill="#C65A6A"/>
  <circle cx="975.7" cy="500.3" r="4.2" fill="#C65A6A"/>
  <circle cx="1091.1" cy="505.7" r="4.2" fill="#C65A6A"/>
  <rect x="110" y="690" width="280" height="170" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="250.0" y="724.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="middle">1989 peak</text>
  <text x="250.0" y="768.0" font-size="34" font-family="Arial, Helvetica, sans-serif" fill="#244A71" font-weight="700" text-anchor="middle">77.5%</text>
  <text x="250.0" y="802.0" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="400" text-anchor="middle">The summer-job market was much bigger.</text>
  <rect x="440" y="690" width="280" height="170" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="580.0" y="724.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="middle">2024</text>
  <text x="580.0" y="768.0" font-size="34" font-family="Arial, Helvetica, sans-serif" fill="#244A71" font-weight="700" text-anchor="middle">60.4%</text>
  <text x="580.0" y="802.0" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="400" text-anchor="middle">Youth labor force participation is still far below the peak.</text>
  <rect x="770" y="690" width="280" height="170" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="910.0" y="724.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="middle">Men / women</text>
  <text x="910.0" y="768.0" font-size="34" font-family="Arial, Helvetica, sans-serif" fill="#244A71" font-weight="700" text-anchor="middle">61.2 / 59.6</text>
  <text x="910.0" y="802.0" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="400" text-anchor="middle">The gender gap is now narrow.</text>
  <text x="110.0" y="888.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Source: BLS The Economics Daily, July 2024 youth labor force participation; chart data for July 1989-2024, Current Population Survey.</text>
</svg>