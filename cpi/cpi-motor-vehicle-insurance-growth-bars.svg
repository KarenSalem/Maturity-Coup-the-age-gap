<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="760" viewBox="0 0 1040 760" role="img" aria-label="The insurance premium shock">
  <defs>
    <linearGradient id="bgFade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#F7F2E8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0D1321" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1040" height="760" rx="30" fill="url(#bgFade)"/>
  <g filter="url(#softShadow)">
    <rect x="22" y="22" width="996" height="716" rx="24" fill="white" opacity="0.88"/>
  </g>
  <text x="52" y="72" font-size="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#101828">The insurance premium shock</text>
  <text x="52" y="102" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#475467">A quick bar graphic for the cumulative increase.</text>
  <text x="56.0" y="132.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">1960 to 2025 growth comparison</text>
  <text x="56.0" y="154.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">A simple graphic to make the inflation gap obvious at a glance.</text>
  <text x="56.0" y="178.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Motor vehicle insurance rose much faster than all items over the same period.</text>
  <text x="66.0" y="236.0" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">All items</text>
  <rect x="170" y="220.0" width="770" height="46" rx="14" fill="#F8FAFC"/>
  <rect x="170" y="220.0" width="225.6" height="46" rx="14" fill="#64748B"/>
  <text x="407.6" y="249.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#64748B" font-weight="700" text-anchor="start">+989.2%</text>
  <text x="66.0" y="376.0" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">Motor vehicle insurance</text>
  <rect x="170" y="360.0" width="770" height="46" rx="14" fill="#F8FAFC"/>
  <rect x="170" y="360.0" width="770.0" height="46" rx="14" fill="#C65A6A"/>
  <text x="952.0" y="389.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#C65A6A" font-weight="700" text-anchor="start">+3375.5%</text>
  <rect x="150" y="540" width="740" height="130" rx="22" fill="#FFF7F8" stroke="#E5E7EB"/>
  <text x="520.0" y="576.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="middle">Big picture</text>
  <text x="520.0" y="618.0" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="middle">Motor vehicle insurance outpaced all-items inflation by 2386.4 percentage points.</text>
  <text x="520.0" y="648.0" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">That is the chart-friendly headline for the package.</text>
</svg>