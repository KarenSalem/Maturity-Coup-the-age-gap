<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Teen pricing context">
  <defs>
    <linearGradient id="bgFade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#F7F2E8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0D1321" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1280" height="760" rx="30" fill="url(#bgFade)"/>
  <g filter="url(#softShadow)">
    <rect x="22" y="22" width="1236" height="716" rx="24" fill="white" opacity="0.88"/>
  </g>
  <text x="52" y="72" font-size="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#101828">Teen pricing context</text>
  <text x="52" y="102" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#475467">A compact source-backed annotation panel for the CPI chart.</text>
  <text x="80.0" y="130.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Teen pricing context from III</text>
  <text x="80.0" y="156.0" font-size="24" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">Why the CPI line matters for households with young drivers</text>
  <text x="80.0" y="188.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">III is not a BLS age series, but it is a useful bridge for explaining why this insurance cost shock hits teens harder.</text>
  <rect x="80" y="240" width="330" height="170" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="80" y="240" width="330" height="10" rx="10" fill="#244A71"/>
  <text x="104.0" y="282.0" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="start">Age is a rating factor</text>
  <text x="104.0" y="328.0" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">Insurers generally charge more for teenagers and young adults under 25.</text>
  <rect x="450" y="240" width="330" height="170" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="450" y="240" width="330" height="10" rx="10" fill="#C65A6A"/>
  <text x="474.0" y="282.0" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="start">Teen surcharge</text>
  <text x="474.0" y="328.0" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">Adding a teenager can raise a family premium by 50% to 100%.</text>
  <rect x="820" y="240" width="330" height="170" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="820" y="240" width="330" height="10" rx="10" fill="#C8971D"/>
  <text x="844.0" y="282.0" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="start">Careful framing</text>
  <text x="844.0" y="328.0" font-size="22" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">Use III for context, not as a substitute for a historical premium series.</text>
  <rect x="80" y="450" width="1120" height="220" rx="28" fill="#FFFDF8" stroke="#F0E5D0"/>
  <text x="120.0" y="492.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="start">How to say it in the story</text>
  <text x="120.0" y="532.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">BLS shows the market-wide insurance index.</text>
  <text x="120.0" y="564.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">III explains why teens feel the increase more sharply: young drivers are priced as higher risk.</text>
  <text x="120.0" y="596.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">That lets you pair the CPI trend with a teen-autonomy argument without pretending BLS publishes age-specific insurance inflation.</text>
  <text x="120.0" y="636.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Sources: https://www.bls.gov/cpi/factsheets/motor-vehicle-insurance.htm | https://www.iii.org/issue-update/background-on-teen-drivers | https://www.iii.org/article/auto-insurance-teen-drivers | https://www.iii.org/article/what-determines-price-my-auto-insurance-policy</text>
</svg>