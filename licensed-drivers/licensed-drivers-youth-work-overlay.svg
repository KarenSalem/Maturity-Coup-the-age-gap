  <text x="120.0" y="960.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Source: BLS July youth labor-force participation series, with 2024 appended from the current TED update; FHWA DL-220 licensed-driver counts via data.transportation.gov.</text>
  <text x="120.0" y="982.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">The licensure line uses ages 16-18 as a share of all licensed drivers. The chart is indexed because the base rates are very different.</text>
