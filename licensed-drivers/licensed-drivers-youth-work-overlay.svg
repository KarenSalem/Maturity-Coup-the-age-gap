  <text x="52" y="72" font-size="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#101828">Summer work and teen licensing moved together</text>
  <text x="52" y="102" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#475467">Indexed to 1963 = 100 so the direction of travel is easy to compare across two different measures.</text>
  <text x="120.0" y="132.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Indexed youth work and teen licensing</text>
  <text x="120.0" y="154.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">Both series are indexed to 1963 = 100 so we can compare the direction of change cleanly.</text>
  <text x="120.0" y="178.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">July youth LFPR for ages 16-24 vs. ages 16-18 as a share of all licensed drivers.</text>
