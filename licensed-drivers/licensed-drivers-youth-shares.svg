  <text x="620.0" y="1032.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">Source: FHWA Highway Statistics Table DL-220 via data.transportation.gov. Percentages are each cohort&#x27;s share of all licensed drivers in that year.</text>
