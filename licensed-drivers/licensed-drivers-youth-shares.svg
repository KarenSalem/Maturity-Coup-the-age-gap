  <text x="160.0" y="162.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#0F172A" font-weight="700" text-anchor="middle">16-18 combined share</text>
  <text x="160.0" y="182.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">Ages 16, 17, and 18 as a share of all licensed drivers</text>
  <rect x="150" y="690" width="280" height="250" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="290.0" y="732.0" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="middle">1963</text>
  <text x="290.0" y="774.0" font-size="34" font-family="Arial, Helvetica, sans-serif" fill="#0F172A" font-weight="700" text-anchor="middle">5.40%</text>
  <text x="290.0" y="806.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="400" text-anchor="middle">Ages 16-18 share of all licensed drivers</text>
  <text x="290.0" y="838.0" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">Teen licensing was a much bigger part of the driving economy.</text>
  <rect x="470" y="690" width="280" height="250" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="610.0" y="732.0" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="middle">2024</text>
  <text x="610.0" y="774.0" font-size="34" font-family="Arial, Helvetica, sans-serif" fill="#0F172A" font-weight="700" text-anchor="middle">2.46%</text>
  <text x="610.0" y="806.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="400" text-anchor="middle">Ages 16-18 share of all licensed drivers</text>
  <text x="610.0" y="838.0" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">The teen slice is still much smaller than it was before adulthood got delayed.</text>
  <rect x="790" y="690" width="330" height="250" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="955.0" y="732.0" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="700" text-anchor="middle">The hardest number to ignore</text>
  <text x="955.0" y="774.0" font-size="34" font-family="Arial, Helvetica, sans-serif" fill="#C65A6A" font-weight="700" text-anchor="middle">1.12%</text>
  <text x="955.0" y="806.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="400" text-anchor="middle">18-year-olds as a share of all licensed drivers in 2024</text>
  <text x="955.0" y="838.0" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">That is the single cleanest teen-autonomy statistic in the table.</text>
  <text x="620.0" y="1032.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">Source: FHWA Highway Statistics Table DL-220 via data.transportation.gov. Percentages are each cohort&#x27;s share of all licensed drivers in that year.</text>
</svg>