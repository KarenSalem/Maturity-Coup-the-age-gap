  <text x="700.0" y="548.0" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="middle">This age stays right around 60%, even across a longer pre-pandemic baseline.</text>
  <text x="700.0" y="570.0" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">That makes 18 the best single-age proxy for the story.</text>
  <text x="620.0" y="732.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="middle">Source: FHWA Table DL-20, Licensed Drivers: Distribution by Sex and Age Group Relative to Population.</text>
