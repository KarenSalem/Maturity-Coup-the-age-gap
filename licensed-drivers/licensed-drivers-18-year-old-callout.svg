<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="760" viewBox="0 0 1240 760" role="img" aria-label="The 18-year-old callout">
  <defs>
    <linearGradient id="bgFade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF8"/>
      <stop offset="100%" stop-color="#F7F2E8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0D1321" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="1240" height="760" rx="30" fill="url(#bgFade)"/>
  <g filter="url(#softShadow)">
    <rect x="22" y="22" width="1196" height="716" rx="24" fill="white" opacity="0.88"/>
  </g>
  <text x="52" y="72" font-size="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#101828">The 18-year-old callout</text>
  <text x="52" y="102" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#475467">A compact view of the strongest quote-ready number in the licensed-driver data.</text>
  <text x="56.0" y="148.0" font-size="52" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">18-year-olds</text>
  <text x="56.0" y="184.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#475467" font-weight="400" text-anchor="start">The cleanest autonomy marker in the driver table.</text>
  <text x="56.0" y="210.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Licensed share of 18-year-olds: 62.2% in 2010, 59.0% in 2012, 60.1% in 2014, 62.1% in 2016, 60.9% in 2018, 58.0% in 2020, 59.8% in 2022, 60.4% in 2024.</text>
