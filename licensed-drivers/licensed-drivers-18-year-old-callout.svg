  <text x="176.0" y="360.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#D1D5DB" font-weight="400" text-anchor="middle">licensed in 2024</text>
  <text x="176.0" y="392.0" font-size="12" font-family="Arial, Helvetica, sans-serif" fill="#9CA3AF" font-weight="400" text-anchor="middle">FHWA DL-20 age-rate table</text>
