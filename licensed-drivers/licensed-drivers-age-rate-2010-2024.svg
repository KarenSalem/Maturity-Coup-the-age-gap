  <text x="52" y="102" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#475467">A denominator-based view of licensed drivers by age across 2010, 2012, 2014, 2016, 2018, 2020, 2022, and 2024.</text>
  <text x="56.0" y="146.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">Licensed share by age, 2010 to 2024</text>
  <text x="56.0" y="170.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">FHWA Table DL-20 shows how likely each age was to be licensed across eight snapshots.</text>
  <text x="56.0" y="192.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">The 18-year-old line is the clearest hinge: 62.2% in 2010, 59.0% in 2012, 60.1% in 2014, 62.1% in 2016, and 60.4% in 2024.</text>
