  <text x="110.0" y="572.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Source: EIA Monthly Energy Review Table 9.4, leaded regular gasoline annual averages from 1963 to 1990.</text>
  <text x="110.0" y="590.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">The panel starts in 1963 to line up with teen licensure; the 1978-1980 jump is still the timing marker for the licensing story.</text>
