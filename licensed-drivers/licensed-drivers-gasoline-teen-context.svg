  <text x="70.0" y="136.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Summer work and 18-year-old licensure</text>
  <text x="70.0" y="158.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">The summer-job line stays high while 18-year-old licensure turns down after the gasoline shock.</text>
  <text x="70.0" y="182.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Youth work uses the existing BLS July youth LFPR series; licensure uses the FHWA DL-220 counts converted into an 18-year-old share.</text>
