  <text x="118.0" y="688.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Source notes: DOL minimum wage history; BLS CPI annual averages for used cars and motor vehicle insurance; EIA annual gasoline prices spliced from leaded regular through 1990 and all-grades gasoline thereafter; BLS Consumer Expenditure annual spending anchors for vehicle purchases, vehicle insurance, and gasoline / motor oil.</text>
  <text x="118.0" y="706.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">The result is an estimated annual cost of ownership divided by the federal minimum wage, expressed as work hours.</text>
  <rect x="118" y="748" width="360" height="190" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="118" y="748" width="360" height="10" rx="10" fill="#244A71"/>
