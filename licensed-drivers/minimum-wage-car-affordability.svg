  <text x="52" y="72" font-size="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#101828">How many minimum-wage hours a car basket required</text>
  <text x="52" y="102" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#475467">A long-run affordability line from 1963 to 2024.</text>
  <text x="118.0" y="132.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Minimum-wage hours needed for a teen driving basket</text>
  <text x="118.0" y="154.0" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">Annual used-vehicle purchases, vehicle insurance, and gasoline spending, backcast to 1963 with official price series.</text>
  <text x="118.0" y="178.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">The basket is indexed from annual household spending anchors, so the result reads like the cost of ownership, not a sticker-price-only proxy.</text>
