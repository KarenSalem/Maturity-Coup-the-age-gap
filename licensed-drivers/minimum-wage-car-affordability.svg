  <text x="142.0" y="836.0" font-size="38" font-family="Arial, Helvetica, sans-serif" fill="#101828" font-weight="700" text-anchor="start">$512</text>
  <text x="142.0" y="870.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">432 hours at the federal minimum wage</text>
  <text x="142.0" y="896.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">10.8 weeks at 40 hours/week</text>
  <text x="142.0" y="922.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">0.9 summers at 12 weeks</text>
  <rect x="508" y="748" width="360" height="190" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="508" y="748" width="360" height="10" rx="10" fill="#C65A6A"/>
