  <text x="532.0" y="870.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">664 hours at the federal minimum wage</text>
  <text x="532.0" y="896.0" font-size="13" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">16.6 weeks at 40 hours/week</text>
