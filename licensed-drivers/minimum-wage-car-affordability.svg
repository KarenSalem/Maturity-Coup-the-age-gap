  <text x="118.0" y="986.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Hours line = annual used-vehicle purchases + vehicle insurance + gasoline/motor oil spending, each backcast to the selected year from the nearest available annual spending anchor.</text>
