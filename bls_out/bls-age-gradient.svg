  <text x="110.0" y="770.0" font-size="11" font-family="Arial, Helvetica, sans-serif" fill="#667085" font-weight="400" text-anchor="start">Source: BLS Employment Projections table 3.3. The teen rate is the stress point; the 25-54 series barely moves.</text>
